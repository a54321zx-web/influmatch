<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유튜브 분석 — InfluMatch</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--navy:#1B3A2D;--green:#2D6A4F;--red:#FF0000;--gold:#B7935A;--bg:#F7FAF8;--card:#FFFFFF;--border:#D8EDE3;--text:#111111;--muted:#777777}
  body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;height:60px;gap:24px}
  .logo{font-size:18px;font-weight:700;color:var(--navy);text-decoration:none}.logo span{color:var(--green)}
  nav a{color:var(--muted);text-decoration:none;font-size:14px}
  .btn-nav{margin-left:auto;background:var(--green);color:#fff!important;padding:8px 20px;border-radius:8px;font-weight:600}

  .page{max-width:1000px;margin:0 auto;padding:32px}

  .form-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:28px}
  .form-card h2{font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:8px}
  .form-row{display:flex;gap:12px;align-items:flex-end}
  .form-group{display:flex;flex-direction:column;gap:6px;flex:1}
  .form-group label{font-size:12px;color:var(--muted);font-weight:600}
  .form-group input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;outline:none}
  .form-group input:focus{border-color:var(--green)}
  .btn{padding:10px 28px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
  .btn-primary{background:#FF0000;color:#fff}
  .btn-primary:hover{background:#CC0000}
  .btn-primary:disabled{background:#ccc;cursor:not-allowed}

  .loading{display:none;text-align:center;padding:40px}
  .loading.show{display:block}
  .spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:#FF0000;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .result{display:none}.result.show{display:block}

  .score-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
  .sc .label{font-size:11px;color:var(--muted);margin-bottom:8px}
  .sc .value{font-size:26px;font-weight:700;color:var(--text)}
  .sc .sub{font-size:11px;color:var(--muted);margin-top:4px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
  .section-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
  .section-card h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}

  .bar-row{margin-bottom:14px}
  .bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
  .bar-label span{color:var(--muted)}
  .bar-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width 0.8s ease}

  .video-list{display:flex;flex-direction:column;gap:10px}
  .video-item{display:flex;gap:12px;padding:10px;background:var(--bg);border-radius:8px}
  .video-rank{width:24px;height:24px;background:#FF0000;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
  .video-info .title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:320px}
  .video-info .meta{font-size:11px;color:var(--muted);display:flex;gap:12px}

  .price-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
  .price-row:last-child{border-bottom:none}
  .price-val{font-size:17px;font-weight:700;color:var(--text)}

  .error-box{background:#FEF0F0;border:1px solid #F5C6C6;border-radius:8px;padding:14px;color:#C0392B;font-size:13px;margin-top:16px;display:none}
  .error-box.show{display:block}

  .yt-badge{background:#FF0000;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">InfluMatch<span>.</span></a>
  <a href="/marketplace">탐색</a>
  <a href="/youtube" style="color:#FF0000;font-weight:600">📺 유튜브 분석</a>
  <a href="/dashboard" style="color:var(--muted)">로그인</a>
  <a href="/join" class="btn-nav">무료 시작</a>
</nav>

<div class="page">
  <div class="form-card">
    <h2>📺 유튜브 채널 분석</h2>
    <div class="form-row">
      <div class="form-group">
        <label>채널명 또는 URL</label>
        <input type="text" id="channel" placeholder="예: @channelname 또는 youtube.com/@channelname" onkeydown="if(event.key==='Enter')runAnalysis()"/>
      </div>
      <button class="btn btn-primary" onclick="runAnalysis()" id="btnAnalyze">분석 시작</button>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="font-size:14px;color:var(--muted)">채널 정보 + 최근 영상 15개 분석 중...</div>
    <div style="font-size:12px;color:var(--muted);margin-top:6px">YouTube Data API 호출 중</div>
  </div>

  <div class="result" id="result">

    <!-- 핵심 지표 -->
    <div class="score-cards">
      <div class="sc">
        <div class="label">신뢰도 점수</div>
        <div class="value" id="rScore">—</div>
        <div class="sub" id="rGrade">—</div>
      </div>
      <div class="sc">
        <div class="label">구독자 수</div>
        <div class="value" style="font-size:20px" id="rSubs">—</div>
        <div class="sub" id="rTier">—</div>
      </div>
      <div class="sc">
        <div class="label">평균 조회수</div>
        <div class="value" style="font-size:20px" id="rViews">—</div>
        <div class="sub" id="rViewRate">—</div>
      </div>
      <div class="sc">
        <div class="label">카테고리</div>
        <div class="value" style="font-size:18px" id="rCategory">—</div>
        <div class="sub" id="rConf">—</div>
      </div>
    </div>

    <div class="grid2">
      <!-- 세부 점수 -->
      <div class="section-card">
        <h3>📊 세부 점수</h3>
        <div id="scoreBreakdown"></div>
      </div>

      <!-- 광고 단가 -->
      <div class="section-card">
        <h3>💰 협찬 광고 단가</h3>
        <div id="priceRows"></div>
        <div style="font-size:11px;color:var(--muted);margin-top:12px">※ 유튜브 협찬 영상 기준 추정치</div>
      </div>
    </div>

    <!-- 최근 영상 -->
    <div class="section-card">
      <h3>🎬 최근 인기 영상</h3>
      <div class="video-list" id="videoList"></div>
    </div>

  </div>
</div>

<script>
const GRADE_CLR={S:'#5B4EC8',A:'#2D6A4F',B:'#B7935A',C:'#E67E22',D:'#C0392B'}
const BAR_CLR=v=>v>=0.7?'#2D6A4F':v>=0.4?'#B7935A':'#C0392B'

async function runAnalysis() {
  const channel = document.getElementById('channel').value.trim()
  if(!channel){ alert('채널명을 입력해 주세요'); return }

  document.getElementById('btnAnalyze').disabled = true
  document.getElementById('loading').className   = 'loading show'
  document.getElementById('result').className    = 'result'
  document.getElementById('errorBox').className  = 'error-box'

  try {
    const handle = channel.replace('https://www.youtube.com/','').replace('https://youtube.com/','').replace('@','')
    const data   = await fetch(`/api/youtube/analyze/${encodeURIComponent(handle)}`).then(r=>r.json())

    if(data.error) {
      document.getElementById('errorBox').textContent = '❌ ' + data.error
      document.getElementById('errorBox').className   = 'error-box show'
      return
    }

    renderResult(data)
  } catch(e) {
    document.getElementById('errorBox').textContent = '❌ 오류: ' + e.message
    document.getElementById('errorBox').className   = 'error-box show'
  } finally {
    document.getElementById('btnAnalyze').disabled = false
    document.getElementById('loading').className   = 'loading'
  }
}

function renderResult(d) {
  const sb  = d.score_breakdown || {}
  const adp = d.ad_price || {}
  const cat = d.category || {}
  const ch  = d.channel_info || {}

  const grade = d.grade || 'D'
  document.getElementById('rScore').textContent    = d.final_score + '점'
  document.getElementById('rScore').style.color    = GRADE_CLR[grade] || '#111'
  document.getElementById('rGrade').textContent    = grade + '등급'
  document.getElementById('rSubs').textContent     = (d.subscriber_count||0).toLocaleString() + '명'
  document.getElementById('rTier').textContent     = (d.tier||'').toUpperCase() + ' 티어'
  document.getElementById('rViews').textContent    = (d.avg_views||0).toLocaleString()
  document.getElementById('rViewRate').textContent = '조회율 ' + (d.view_rate||0) + '%'
  document.getElementById('rCategory').textContent = cat.primary || '일반'
  document.getElementById('rConf').textContent     = cat.confidence ? (cat.confidence*100).toFixed(0)+'% 신뢰도' : ''

  // 세부 점수
  const items = [
    {label:'조회율',      key:'view_rate'},
    {label:'좋아요율',    key:'like_rate'},
    {label:'댓글율',      key:'comment_rate'},
    {label:'업로드 일관성',key:'consistency'},
  ]
  document.getElementById('scoreBreakdown').innerHTML = items.map(item=>{
    const v=sb[item.key]||0, pct=Math.round(v*100), clr=BAR_CLR(v)
    return `<div class="bar-row">
      <div class="bar-label"><b>${item.label}</b><span>${pct}점</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${clr}"></div></div>
    </div>`
  }).join('')

  // 광고 단가
  document.getElementById('priceRows').innerHTML = `
    <div class="price-row">
      <span>🎬 협찬 영상</span>
      <span class="price-val">${adp.sponsorship_fmt||'—'}</span>
    </div>
    <div class="price-row">
      <span>📊 평균 좋아요</span>
      <span class="price-val">${(d.avg_likes||0).toLocaleString()}</span>
    </div>
    <div class="price-row">
      <span>💬 평균 댓글</span>
      <span class="price-val">${(d.avg_comments||0).toLocaleString()}</span>
    </div>
    <div class="price-row">
      <span>📹 분석 영상 수</span>
      <span class="price-val">${d.videos_analyzed||0}개</span>
    </div>`

  // 최근 영상
  const videos = d.recent_videos || []
  document.getElementById('videoList').innerHTML = videos.map((v,i)=>`
    <div class="video-item">
      <div class="video-rank">${i+1}</div>
      <div class="video-info">
        <div class="title">${v.title}</div>
        <div class="meta">
          <span>👁 ${v.view_count.toLocaleString()}</span>
          <span>👍 ${v.like_count.toLocaleString()}</span>
          <span>💬 ${v.comment_count.toLocaleString()}</span>
          <span>${(v.published_at||'').slice(0,10)}</span>
        </div>
      </div>
    </div>`).join('')

  document.getElementById('result').className = 'result show'
}
</script>
</body>
</html>
