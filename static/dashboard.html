<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이페이지 — InfluMatch</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --navy:#1B3A2D;
    --red:#2D6A4F;
    --gold:#B7935A;
    --green:#2D6A4F;
    --yellow:#B7935A;
    --danger:#C0392B;
    --bg:#F7FAF8;
    --card:#FFFFFF;
    --border:#D8EDE3;
    --text:#111111;
    --muted:#777777;
    --navy2:#1B3A2D;
  }
  body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;height:60px;gap:24px}
  .logo{font-size:18px;font-weight:700;color:var(--navy);text-decoration:none}.logo span{color:var(--red)}
  nav a{color:var(--muted);text-decoration:none;font-size:14px}
  nav a:hover{color:var(--text)}
  .btn-nav{margin-left:auto;background:var(--red);color:#fff!important;padding:8px 20px;border-radius:8px;font-weight:600;border:none;cursor:pointer;font-size:14px}

  /* 로그인 화면 */
  .login-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:20px}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px;text-align:center}
  .login-card h2{font-size:22px;color:var(--navy);margin-bottom:8px}
  .login-card p{font-size:14px;color:var(--muted);margin-bottom:28px}
  .form-group{margin-bottom:16px;text-align:left}
  .form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase}
  .form-group input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:8px;font-size:14px;outline:none}
  .form-group input:focus{border-color:var(--red)}
  .btn-login{width:100%;background:var(--red);color:#fff;border:none;padding:13px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
  .btn-login:hover{background:#1B3A2D}
  .error-msg{color:var(--danger);font-size:13px;margin-top:12px;display:none}
  .error-msg.show{display:block}

  /* 대시보드 */
  .dash{display:none;padding:32px;max-width:1000px;margin:0 auto}
  .dash.show{display:block}

  /* 프로필 헤더 */
  .profile-header{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 32px;display:flex;align-items:center;gap:24px;margin-bottom:24px}
  .avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--navy));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;flex-shrink:0}
  .profile-info h2{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:4px}
  .profile-info .handle{font-size:14px;color:var(--muted);margin-bottom:8px}
  .profile-info .tags{display:flex;gap:8px;flex-wrap:wrap}
  .tag{padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600}
  .grade-tag{color:#fff}
  .cat-tag{background:#E8F3ED;color:#2D6A4F}
  .tier-tag{background:rgba(245,166,35,0.15);color:var(--gold)}
  .profile-actions{margin-left:auto;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .btn-reanalyze{background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;transition:all 0.2s}
  .btn-reanalyze:hover{border-color:var(--red);color:var(--red)}
  .last-analyzed{font-size:11px;color:var(--muted)}

  /* 점수 카드 */
  .score-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
  .sc .label{font-size:11px;color:var(--muted);margin-bottom:8px}
  .sc .value{font-size:26px;font-weight:800;color:var(--navy)}
  .sc .sub{font-size:11px;color:var(--muted);margin-top:4px}

  /* 섹션 */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
  .section-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
  .section-card h3{font-size:14px;color:var(--navy);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}

  /* 점수 바 */
  .bar-row{margin-bottom:14px}
  .bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
  .bar-label span{color:var(--muted)}
  .bar-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width 1s ease}

  /* 광고 단가 */
  .price-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
  .price-row:last-child{border-bottom:none}
  .price-type{font-size:13px}
  .price-val{font-size:17px;font-weight:700;color:#111111}

  /* 진단 */
  .diag-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
  .diag-row:last-child{border-bottom:none}
  .diag-row .key{color:var(--muted)}

  /* 개선 팁 */
  .tips{margin-bottom:20px}
  .tip{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:8px;padding:14px 18px;margin-bottom:10px;font-size:13px;line-height:1.6}
  .tip .tip-title{font-weight:700;color:var(--gold);margin-bottom:4px}

  /* 재분석 로딩 */
  .reanalyzing{display:none;text-align:center;padding:40px}
  .reanalyzing.show{display:block}
  .spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">InfluMatch<span>.</span></a>
  <a href="/marketplace">탐색</a>
  <div id="notifBell" style="display:none;margin-left:auto;position:relative;cursor:pointer" onclick="toggleNotif()">
    <span style="font-size:20px">🔔</span>
    <span id="notifBadge" style="display:none;position:absolute;top:-4px;right:-4px;background:#C0392B;color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:10px">0</span>
  </div>
  <button class="btn-nav" id="logoutBtn" onclick="logout()" style="display:none;margin-left:12px">로그아웃</button>
</nav>

<!-- 알림 드롭다운 -->
<div id="notifDropdown" style="display:none;position:fixed;top:65px;right:20px;width:340px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:999;max-height:440px;overflow-y:auto">
  <div style="padding:14px 18px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;color:var(--text)">알림</div>
  <div id="notifList" style="padding:8px 0"></div>
</div>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div style="font-size:40px;margin-bottom:12px">📱</div>
    <h2>마이페이지 로그인</h2>
    <p>등록 시 사용한 이메일을 입력해 주세요</p>
    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="loginEmail" placeholder="example@email.com" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="form-group">
      <label>인스타그램 계정</label>
      <input type="text" id="loginHandle" placeholder="계정명 (@ 제외)" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="error-msg" id="loginError"></div>
    <p style="margin-top:20px;font-size:12px;color:var(--muted)">아직 등록하지 않으셨나요? <a href="/join" style="color:var(--red)">인플루언서 등록하기</a></p>
  </div>
</div>

<!-- 대시보드 -->
<div class="dash" id="dashboard">

  <!-- 재분석 로딩 -->
  <div class="reanalyzing" id="reanalyzingBox">
    <div class="spinner"></div>
    <div style="font-size:16px;color:var(--text)">재분석 중...</div>
    <div style="font-size:13px;color:var(--muted);margin-top:6px">약 2~3분 소요됩니다</div>
  </div>

  <!-- 프로필 헤더 -->
  <div class="profile-header" id="profileHeader">
    <div class="avatar" id="dAvatar">?</div>
    <div class="profile-info">
      <h2 id="dName">—</h2>
      <div class="handle" id="dHandle">—</div>
      <div class="tags">
        <span class="tag grade-tag" id="dGradeTag">—</span>
        <span class="tag tier-tag" id="dTierTag">—</span>
        <span class="tag cat-tag" id="dCatTag">—</span>
      </div>
    </div>
    <div class="profile-actions">
      <button class="btn-reanalyze" onclick="reanalyze()">🔄 재분석 요청</button>
      <div class="last-analyzed" id="dLastAnalyzed">—</div>
    </div>
  </div>

  <!-- 핵심 점수 -->
  <div class="score-cards">
    <div class="sc">
      <div class="label">신뢰도 점수</div>
      <div class="value" id="dScore">—</div>
      <div class="sub" id="dGradeSub">—</div>
    </div>
    <div class="sc">
      <div class="label">팔로워 수</div>
      <div class="value" style="font-size:20px" id="dFollowers">—</div>
      <div class="sub" id="dTierSub">—</div>
    </div>
    <div class="sc">
      <div class="label">참여율 (ER)</div>
      <div class="value" id="dER">—</div>
      <div class="sub">게시물 평균</div>
    </div>
    <div class="sc">
      <div class="label">가짜팔로워</div>
      <div class="value" id="dFake">—</div>
      <div class="sub" id="dRisk">—</div>
    </div>
  </div>

  <div class="grid2">
    <!-- 세부 점수 -->
    <div class="section-card">
      <h3>📊 세부 점수 분석</h3>
      <div id="scoreBreakdown"></div>
    </div>

    <!-- 광고 단가 -->
    <div class="section-card">
      <h3>💰 광고 단가 추정</h3>
      <div id="priceRows"></div>
      <div style="font-size:11px;color:var(--muted);margin-top:14px">※ 시장 실거래가 기준 추정치입니다</div>
    </div>
  </div>

  <!-- 개선 팁 -->
  <div class="section-card" style="margin-bottom:20px">
    <h3>💡 점수 향상 팁</h3>
    <div id="tipsList"></div>
  </div>

  <!-- 진단 상세 -->
  <div class="section-card">
    <h3>🔎 상세 진단</h3>
    <div id="diagRows"></div>
  </div>

</div>

<script>
const GRADE_CLR={S:'#5B4EC8',A:'#2D6A4F',B:'#B7935A',C:'#E67E22',D:'#C0392B'}
const RISK_CLR={LOW:'#27AE60',MEDIUM:'#F39C12',HIGH:'#E74C3C'}
const BAR_CLR=v=>v>=0.7?'#27AE60':v>=0.4?'#F39C12':'#E74C3C'

let currentHandle = ''

async function doLogin() {
  const email  = document.getElementById('loginEmail').value.trim()
  const handle = document.getElementById('loginHandle').value.trim().replace('@','')
  const pw     = document.getElementById('loginPw').value
  if(!email||!handle||!pw){ showLoginError('모든 항목을 입력해 주세요'); return }

  try {
    const res  = await fetch('/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({insta_handle: handle, password: pw})
    })
    const data = await res.json()
    if(data.error){ showLoginError(data.error); return }

    localStorage.setItem('inf_token', data.token)
    sessionStorage.setItem('inf_handle', handle)
    sessionStorage.setItem('inf_email', email)
    currentHandle = handle

    const inf = await fetch(`/api/influencer/${handle}`).then(r=>r.json())
    showDashboard(inf)
  } catch(e) {
    showLoginError('서버 오류: '+e.message)
  }
}

function showLoginError(msg) {
  const el=document.getElementById('loginError')
  el.textContent='❌ '+msg; el.className='error-msg show'
}

function showDashboard(inf) {
  document.getElementById('loginWrap').style.display='none'
  document.getElementById('dashboard').className='dash show'
  document.getElementById('logoutBtn').style.display='block'
  renderDashboard(inf)
}

function logout() {
  localStorage.removeItem('inf_token')
  sessionStorage.clear()
  location.reload()
}

function renderDashboard(inf) {
  const grade = inf.grade || 'D'
  const gc    = GRADE_CLR[grade] || '#555'

  // 프로필 헤더
  document.getElementById('dAvatar').textContent   = (inf.name||'?').charAt(0).toUpperCase()
  document.getElementById('dName').textContent     = inf.name || '—'
  document.getElementById('dHandle').textContent   = '@' + inf.insta_handle
  document.getElementById('dLastAnalyzed').textContent = inf.last_analyzed ? '마지막 분석: '+inf.last_analyzed : '분석 대기 중'

  const gt = document.getElementById('dGradeTag')
  gt.textContent = grade+'등급'; gt.style.background=gc; gt.style.color='#fff'
  document.getElementById('dTierTag').textContent  = (inf.tier||'—').toUpperCase()
  document.getElementById('dCatTag').textContent   = inf.category || '일반'

  // 핵심 카드
  const scoreEl = document.getElementById('dScore')
  scoreEl.textContent = (inf.final_score||0)+'점'
  scoreEl.style.color = gc
  document.getElementById('dGradeSub').textContent = grade+'등급'
  document.getElementById('dFollowers').textContent= (inf.follower_count||0).toLocaleString()+'명'
  document.getElementById('dTierSub').textContent  = (inf.tier||'—').toUpperCase()+' 티어'
  document.getElementById('dER').textContent       = (inf.raw_er||0).toFixed(1)+'%'
  const fakeEl = document.getElementById('dFake')
  fakeEl.textContent = (inf.fake_ratio||0)+'%'
  fakeEl.style.color = RISK_CLR[inf.fake_risk]||'#fff'
  document.getElementById('dRisk').textContent = inf.fake_risk==='LOW'?'🟢 양호':inf.fake_risk==='MEDIUM'?'🟡 주의':'🔴 위험'

  // 세부 점수
  const items=[
    {label:'참여도 (ER)',   val:inf.engagement_score,  desc:'ER 기반 티어 정규화'},
    {label:'팔로워 품질',   val:inf.follower_quality,  desc:'샘플 신뢰도 분석'},
    {label:'댓글 품질',     val:inf.comment_quality,   desc:'진성 댓글 비율'},
    {label:'인게이지먼트 일관성', val:inf.consistency, desc:'게시물 편차'},
  ]
  document.getElementById('scoreBreakdown').innerHTML=items.map(item=>{
    const v=item.val||0, pct=Math.round(v*100), clr=BAR_CLR(v)
    return `<div class="bar-row">
      <div class="bar-label"><b>${item.label}</b><span>${pct}점</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${clr}"></div></div>
    </div>`
  }).join('')

  // 광고 단가
  const prices=[
    ['📸 피드 게시물', inf.feed_fmt||'—'],
    ['📖 스토리',      inf.story_fmt||'—'],
    ['🎬 릴스',        inf.reels_fmt||'—'],
  ]
  document.getElementById('priceRows').innerHTML=prices.map(([t,p])=>
    `<div class="price-row"><span class="price-type">${t}</span><span class="price-val">${p}</span></div>`
  ).join('')

  // 개선 팁
  const tips = generateTips(inf)
  document.getElementById('tipsList').innerHTML=tips.map(t=>
    `<div class="tip"><div class="tip-title">${t.title}</div>${t.body}</div>`
  ).join('')

  // 상세 진단
  const diag=[
    ['등록일',        inf.joined_at||'—'],
    ['마지막 분석',   inf.last_analyzed||'대기 중'],
    ['분석 상태',     inf.status==='active'?'✅ 검증 완료':inf.status==='pending'?'⏳ 대기 중':'—'],
    ['가짜팔로워 비율', (inf.fake_ratio||0)+'%'],
    ['리스크 등급',   inf.fake_risk||'—'],
  ]
  document.getElementById('diagRows').innerHTML=diag.map(([k,v])=>
    `<div class="diag-row"><span class="key">${k}</span><span>${v}</span></div>`
  ).join('')
}

function generateTips(inf) {
  const tips=[]
  if((inf.engagement_score||0) < 0.4)
    tips.push({title:'📈 참여율 향상',body:'스토리와 릴스를 자주 올리고 팔로워와 댓글로 소통을 늘려 보세요. 참여율(ER)이 높을수록 광고 단가가 올라갑니다.'})
  if((inf.comment_quality||0) < 0.5)
    tips.push({title:'💬 댓글 품질 개선',body:'이모지나 단어 1~2개짜리 봇성 댓글보다 진성 댓글이 많을수록 신뢰도 점수가 올라가요. 질문을 던지는 게시물이 효과적입니다.'})
  if((inf.fake_ratio||0) > 20)
    tips.push({title:'🚨 가짜 팔로워 정리',body:'가짜 팔로워 비율이 높습니다. 팔로워 청소 서비스를 이용해 비활성 계정을 정리하면 신뢰도가 올라갑니다.'})
  if((inf.consistency||0) < 0.5)
    tips.push({title:'📅 꾸준한 업로드',body:'게시물마다 좋아요 편차가 크면 일관성 점수가 낮아져요. 주 3회 이상 꾸준히 올리면 개선됩니다.'})
  if(tips.length===0)
    tips.push({title:'🏆 좋은 상태입니다!',body:'현재 모든 지표가 양호합니다. 꾸준히 콘텐츠를 올리고 팔로워와 소통하면 등급이 더 올라갈 수 있어요.'})
  return tips
}

async function reanalyze() {
  if(!confirm('재분석을 시작할까요? 약 2~3분 소요됩니다.')) return
  document.getElementById('profileHeader').style.display='none'
  document.getElementById('reanalyzingBox').className='reanalyzing show'

  try {
    const res  = await fetch(`/api/reanalyze/${currentHandle}`, {method:'POST'})
    const data = await res.json()
    document.getElementById('reanalyzingBox').className='reanalyzing'
    document.getElementById('profileHeader').style.display='flex'
    if(data.error){ alert('재분석 실패: '+data.error); return }
    const inf = await fetch(`/api/influencer/${currentHandle}`).then(r=>r.json())
    renderDashboard(inf)
    alert('재분석 완료! 점수가 업데이트되었습니다.')
  } catch(e) {
    alert('오류: '+e.message)
    document.getElementById('reanalyzingBox').className='reanalyzing'
    document.getElementById('profileHeader').style.display='flex'
  }
}

// 세션 복원
window.onload = () => {
  const token  = localStorage.getItem('inf_token')
  const handle = sessionStorage.getItem('inf_handle')
  if(token && handle) {
    fetch(`/api/influencer/${handle}`, {
      headers:{'Authorization':'Bearer '+token}
    }).then(r=>r.json()).then(data=>{
      if(!data.error) {
        currentHandle = handle
        showDashboard(data)
        loadNotifications(handle)
      }
    }).catch(()=>{})
  }
}

async function loadNotifications(handle) {
  try {
    const data = await fetch(`/api/notifications/${handle}`).then(r=>r.json())
    const unread = data.unread || 0
    const bell   = document.getElementById('notifBell')
    const badge  = document.getElementById('notifBadge')
    bell.style.display = 'block'
    if(unread > 0) {
      badge.style.display = 'block'
      badge.textContent   = unread
    }
    const list = document.getElementById('notifList')
    const notifs = data.notifications || []
    if(!notifs.length) {
      list.innerHTML = '<div style="padding:20px;text-align:center;font-size:13px;color:var(--muted)">알림이 없습니다</div>'
      return
    }
    list.innerHTML = notifs.map(n => `
      <div onclick="readNotif(${n.id},this)" style="padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer;background:${n.is_read?'#fff':'#EFF7F3'};transition:background 0.2s">
        <div style="font-size:13px;font-weight:${n.is_read?'400':'600'};color:var(--text);margin-bottom:3px">${n.title}</div>
        <div style="font-size:11px;color:var(--muted)">${n.body||''}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:4px">${(n.created_at||'').slice(0,16)}</div>
      </div>`).join('')
  } catch(e){}
}

async function readNotif(id, el) {
  await fetch(`/api/notifications/${id}/read`, {method:'POST'})
  el.style.background = '#fff'
  el.querySelector('div').style.fontWeight = '400'
  const badge = document.getElementById('notifBadge')
  const cur   = parseInt(badge.textContent||'0') - 1
  if(cur <= 0) badge.style.display='none'
  else badge.textContent = cur
}

function toggleNotif() {
  const d = document.getElementById('notifDropdown')
  d.style.display = d.style.display==='none' ? 'block' : 'none'
}

document.addEventListener('click', e => {
  if(!e.target.closest('#notifBell') && !e.target.closest('#notifDropdown'))
    document.getElementById('notifDropdown').style.display='none'
})
</script>
</body>
</html>
