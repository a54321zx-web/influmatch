<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>결제 실패 — InfluMatch</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:#F7FAF8;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;border:1px solid #D8EDE3;border-radius:16px;padding:48px;text-align:center;max-width:400px}
  .icon{font-size:56px;margin-bottom:16px}
  h1{font-size:22px;font-weight:700;margin-bottom:8px}
  p{font-size:14px;color:#777;margin-bottom:24px}
  .btn{display:inline-block;background:#2D6A4F;color:#fff;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="icon">😢</div>
  <h1>결제가 취소되었습니다</h1>
  <p id="msg">결제를 취소하셨거나 오류가 발생했습니다.</p>
  <a href="/pricing" class="btn">요금제로 돌아가기</a>
</div>
<script>
const params = new URLSearchParams(location.search)
const msg = params.get('message')
if(msg) document.getElementById('msg').textContent = msg
</script>
</body>
</html>
