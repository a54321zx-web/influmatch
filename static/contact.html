<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객센터 — InfluMatch</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--green:#2D6A4F;--navy:#1B3A2D;--bg:#F7FAF8;--card:#FFFFFF;--border:#D8EDE3;--text:#111111;--muted:#777777}
  body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text)}
  nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;height:60px}
  .logo{font-size:18px;font-weight:700;color:var(--navy);text-decoration:none}.logo span{color:var(--green)}
  .back{margin-left:auto;color:var(--muted);text-decoration:none;font-size:14px}
  .page{max-width:760px;margin:0 auto;padding:48px 24px}
  h1{font-size:28px;font-weight:700;margin-bottom:8px}
  .sub{font-size:15px;color:var(--muted);margin-bottom:40px}
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:40px}
  .contact-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;text-align:center}
  .contact-icon{font-size:36px;margin-bottom:12px}
  .contact-card h3{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px}
  .contact-card p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:14px}
  .btn{display:inline-block;background:var(--green);color:#fff;padding:9px 22px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none}
  .btn-outline{background:transparent;color:var(--green);border:1px solid var(--green)}
  .form-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px}
  .form-card h2{font-size:18px;font-weight:700;color:var(--text);margin-bottom:20px}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase}
  .form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:8px;font-size:14px;outline:none;font-family:inherit}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--green)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn-submit{background:var(--green);color:#fff;border:none;padding:13px 28px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:4px}
  .success{display:none;text-align:center;padding:32px;background:#E8F3ED;border-radius:12px;margin-top:16px}
  .success h3{color:var(--green);font-size:18px;margin-bottom:8px}
  .success p{color:var(--muted);font-size:14px}
</style>
</head>
<body>
<nav><a href="/" class="logo">InfluMatch<span>.</span></a><a href="/" class="back">← 홈으로</a></nav>
<div class="page">
  <h1>고객센터</h1>
  <p class="sub">무엇이든 편하게 문의해 주세요</p>

  <div class="contact-grid">
    <div class="contact-card">
      <div class="contact-icon">📧</div>
      <h3>이메일 문의</h3>
      <p>영업일 기준 24시간 이내 답변드립니다</p>
      <a href="mailto:contact@influmatch.kr" class="btn">이메일 보내기</a>
    </div>
    <div class="contact-card">
      <div class="contact-icon">💬</div>
      <h3>카카오톡 채널</h3>
      <p>빠른 답변이 필요하시다면 카톡으로 연락주세요</p>
      <a href="https://pf.kakao.com" class="btn btn-outline" target="_blank">카카오톡 문의</a>
    </div>
  </div>

  <div class="form-card">
    <h2>1:1 문의하기</h2>
    <div id="contactForm">
      <div class="form-row">
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="cName" placeholder="홍길동"/>
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="cEmail" placeholder="example@email.com"/>
        </div>
      </div>
      <div class="form-group">
        <label>문의 유형</label>
        <select id="cType">
          <option value="">선택해 주세요</option>
          <option value="account">계정/로그인</option>
          <option value="analysis">AI 분석</option>
          <option value="payment">결제/환불</option>
          <option value="matching">광고 매칭</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>문의 내용</label>
        <textarea id="cContent" rows="5" placeholder="문의하실 내용을 자세히 작성해 주세요"></textarea>
      </div>
      <button class="btn-submit" onclick="submitContact()">문의 접수하기</button>
    </div>
    <div class="success" id="successMsg">
      <h3>✅ 문의가 접수되었습니다!</h3>
      <p>영업일 기준 24시간 이내에 이메일로 답변드릴게요.<br>contact@influmatch.kr에서 발송됩니다.</p>
    </div>
  </div>

  <div style="margin-top:32px;padding:20px;background:var(--card);border-radius:12px;border:1px solid var(--border);font-size:13px;color:var(--muted);line-height:1.8">
    <b style="color:var(--navy)">운영 시간</b><br>
    평일 10:00 ~ 18:00 (주말/공휴일 휴무)<br>
    이메일: contact@influmatch.kr
  </div>
</div>
<script>
function submitContact() {
  const name=document.getElementById('cName').value.trim()
  const email=document.getElementById('cEmail').value.trim()
  const content=document.getElementById('cContent').value.trim()
  if(!name||!email||!content){alert('이름, 이메일, 문의 내용을 입력해 주세요');return}
  document.getElementById('contactForm').style.display='none'
  document.getElementById('successMsg').style.display='block'
}
</script>
</body>
</html>
