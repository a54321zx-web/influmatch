<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인플루언서 등록 — InfluMatch</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --navy:#1B3A2D;
    --red:#2D6A4F;
    --gold:#B7935A;
    --green:#2D6A4F;
    --yellow:#B7935A;
    --danger:#C0392B;
    --bg:#F7FAF8;
    --card:#FFFFFF;
    --border:#D8EDE3;
    --text:#111111;
    --muted:#777777;
    --navy2:#1B3A2D;
  }
  body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
  nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;height:60px}
  .logo{font-size:18px;font-weight:700;color:var(--navy);text-decoration:none}
  .logo span{color:var(--red)}
  .nav-back{margin-left:auto;color:var(--muted);text-decoration:none;font-size:14px}
  .nav-back:hover{color:var(--text)}

  .page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px}
  .join-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:500px}
  .join-card h1{font-size:24px;font-weight:800;color:var(--navy);margin-bottom:6px}
  .join-card .sub{font-size:14px;color:var(--muted);margin-bottom:32px}

  .form-group{margin-bottom:20px}
  .form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
  .form-group input,.form-group select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:8px;font-size:14px;outline:none;transition:border-color 0.2s}
  .form-group input:focus,.form-group select:focus{border-color:var(--red)}
  .form-group .hint{font-size:11px;color:var(--muted);margin-top:5px}

  .insta-row{display:flex;gap:8px}
  .insta-prefix{background:var(--border);border:1px solid var(--border);color:var(--muted);padding:12px 14px;border-radius:8px 0 0 8px;font-size:14px;white-space:nowrap}
  .insta-row input{border-radius:0 8px 8px 0!important;flex:1}

  .btn-submit{width:100%;background:var(--red);color:#fff;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px}
  .btn-submit:hover{background:#1B3A2D}
  .btn-submit:disabled{background:#444;cursor:not-allowed}

  .terms{font-size:11px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.6}

  /* 분석 진행 */
  .analyzing{display:none;text-align:center;padding:20px 0}
  .analyzing.show{display:block}
  .spinner{width:56px;height:56px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .analyzing h3{font-size:18px;color:var(--navy);margin-bottom:8px}
  .analyzing p{font-size:13px;color:var(--muted)}
  .progress-steps{margin-top:24px;text-align:left}
  .step{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px;color:var(--muted)}
  .step.done{color:var(--green)}
  .step.active{color:var(--text)}
  .step-icon{width:20px;text-align:center}

  /* 결과 */
  .result{display:none}
  .result.show{display:block}
  .result-header{text-align:center;padding:20px 0 28px;border-bottom:1px solid var(--border);margin-bottom:28px}
  .grade-circle{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;margin:0 auto 12px;color:#fff}
  .result-name{font-size:20px;font-weight:700;color:#fff}
  .result-handle{font-size:14px;color:var(--muted)}
  .result-rows{margin-bottom:24px}
  .result-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
  .result-row:last-child{border-bottom:none}
  .result-row .key{color:var(--muted)}
  .result-row .val{font-weight:600}
  .btn-marketplace{display:block;width:100%;background:var(--green);color:#fff;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;margin-top:8px}

  .error-box{background:#2a1a1a;border:1px solid var(--danger,#E74C3C);border-radius:8px;padding:14px;color:#E74C3C;font-size:13px;margin-top:16px;display:none}
  .error-box.show{display:block}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">InfluMatch<span>.</span></a>
  <a href="/dashboard" style="color:var(--muted);text-decoration:none;font-size:14px;margin-right:16px">로그인</a>
  <a href="/" class="nav-back">← 홈으로</a>
</nav>

<div class="page">
  <div class="join-card">
    <!-- 폼 -->
    <div id="formSection">
      <h1>인플루언서 등록</h1>
      <p class="sub">정보를 입력하면 AI가 자동으로 신뢰도를 분석합니다</p>

      <div class="form-group">
        <label>이름</label>
        <input type="text" id="name" placeholder="홍길동" />
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="email" placeholder="example@email.com" />
      </div>
      <div class="form-group">
        <label>연락처 (선택)</label>
        <input type="tel" id="phone" placeholder="010-0000-0000" />
      </div>
      <div class="form-group">
        <label>인스타그램 계정</label>
        <div class="insta-row">
          <span class="insta-prefix">@</span>
          <input type="text" id="handle" placeholder="계정명 (@ 제외)" />
        </div>
        <div class="hint">예: wonotd.fashion.guide</div>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="password" placeholder="6자 이상 입력해 주세요" />
        <div class="hint">마이페이지 로그인에 사용됩니다</div>
      </div>
      <div class="form-group">
        <label>카테고리</label>
        <select id="category">
          <option value="">자동 분류 (권장)</option>
          <option value="뷰티">뷰티</option>
          <option value="패션">패션</option>
          <option value="음식">음식</option>
          <option value="여행">여행</option>
          <option value="육아">육아</option>
          <option value="운동">운동</option>
          <option value="게임">게임</option>
          <option value="IT/테크">IT/테크</option>
          <option value="반려동물">반려동물</option>
          <option value="인테리어">인테리어</option>
        </select>
      </div>

      <button class="btn-submit" id="btnSubmit" onclick="submitJoin()">등록 및 분석 시작</button>
      <div class="terms">등록하면 <a href="/terms" target="_blank" style="color:var(--green)">이용약관</a> 및 <a href="/privacy" target="_blank" style="color:var(--green)">개인정보처리방침</a>에 동의하는 것으로 간주됩니다.</div>
      <div class="error-box" id="errorBox"></div>
    </div>

    <!-- 분석 중 -->
    <div class="analyzing" id="analyzingSection">
      <div class="spinner"></div>
      <h3>AI 분석 중입니다...</h3>
      <p>팔로워 300명 샘플링 + 게시물 실측 중</p>
      <div class="progress-steps">
        <div class="step" id="step1"><span class="step-icon">⏳</span> 계정 정보 수집</div>
        <div class="step" id="step2"><span class="step-icon">⏳</span> 게시물 실측 분석</div>
        <div class="step" id="step3"><span class="step-icon">⏳</span> 팔로워 샘플링</div>
        <div class="step" id="step4"><span class="step-icon">⏳</span> 신뢰도 스코어링</div>
        <div class="step" id="step5"><span class="step-icon">⏳</span> 등급 부여 및 저장</div>
      </div>
    </div>

    <!-- 결과 -->
    <div class="result" id="resultSection">
      <div class="result-header">
        <div class="grade-circle" id="rGradeCircle">—</div>
        <div class="result-name" id="rName">—</div>
        <div class="result-handle" id="rHandle">—</div>
      </div>
      <div class="result-rows" id="rRows"></div>
      <a href="/marketplace" class="btn-marketplace">마켓플레이스에서 내 프로필 보기 →</a>
    </div>
  </div>
</div>

<script>
const GRADE_CLR={S:'#5B4EC8',A:'#2D6A4F',B:'#B7935A',C:'#E67E22',D:'#C0392B'}
const RISK_CLR={LOW:'🟢 양호',MEDIUM:'🟡 주의',HIGH:'🔴 위험'}

function setStep(n, status) {
  const el = document.getElementById('step'+n)
  if(!el) return
  if(status==='done')   { el.className='step done'; el.querySelector('.step-icon').textContent='✅' }
  if(status==='active') { el.className='step active'; el.querySelector('.step-icon').textContent='⏳' }
}

async function submitJoin() {
  const name     = document.getElementById('name').value.trim()
  const email    = document.getElementById('email').value.trim()
  const phone    = document.getElementById('phone').value.trim()
  const handle   = document.getElementById('handle').value.trim().replace('@','')
  const password = document.getElementById('password').value
  const cat      = document.getElementById('category').value

  if(!name||!email||!handle)     { showError('이름, 이메일, 계정명은 필수입니다'); return }
  if(!email.includes('@'))       { showError('올바른 이메일을 입력해 주세요'); return }
  if(!password||password.length<6){ showError('비밀번호는 6자 이상이어야 합니다'); return }

  document.getElementById('btnSubmit').disabled=true
  document.getElementById('errorBox').className='error-box'

  // 분석 화면 전환
  document.getElementById('formSection').style.display='none'
  document.getElementById('analyzingSection').className='analyzing show'

  // 스텝 애니메이션
  const delays = [0, 30000, 60000, 90000, 110000]
  delays.forEach((d,i) => setTimeout(()=>setStep(i+1,'active'), d))
  setTimeout(()=>setStep(1,'done'), 15000)
  setTimeout(()=>setStep(2,'done'), 45000)
  setTimeout(()=>setStep(3,'done'), 85000)
  setTimeout(()=>setStep(4,'done'), 105000)

  try {
    const res  = await fetch('/api/join', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, email, phone, insta_handle: handle, category: cat, password})
    })
    const data = await res.json()

    setStep(5,'done')

    if(data.error) { showError(data.error); document.getElementById('formSection').style.display='block'; document.getElementById('analyzingSection').className='analyzing'; return }

    renderResult(data, name, handle)

  } catch(e) {
    showError('서버 오류: '+e.message)
    document.getElementById('formSection').style.display='block'
    document.getElementById('analyzingSection').className='analyzing'
  }
}

function renderResult(data, name, handle) {
  document.getElementById('analyzingSection').className='analyzing'
  document.getElementById('resultSection').className='result show'

  const grade = data.grade || 'D'
  const gc    = document.getElementById('rGradeCircle')
  gc.textContent = grade
  gc.style.background = GRADE_CLR[grade]||'#555'

  document.getElementById('rName').textContent   = name
  document.getElementById('rHandle').textContent = '@' + handle

  const rows = [
    ['최종 점수',      (data.final_score||0)+'점'],
    ['팔로워 티어',    (data.tier||'').toUpperCase()],
    ['팔로워 수',      (data.follower_count||0).toLocaleString()+'명'],
    ['카테고리',       data.category||'일반'],
    ['가짜팔로워',     RISK_CLR[data.fake_risk]||'—'],
    ['피드 광고 단가', data.feed_fmt||'—'],
    ['릴스 광고 단가', data.reels_fmt||'—'],
  ]
  document.getElementById('rRows').innerHTML = rows.map(([k,v])=>
    `<div class="result-row"><span class="key">${k}</span><span class="val">${v}</span></div>`
  ).join('')
}

function showError(msg) {
  document.getElementById('btnSubmit').disabled=false
  const b=document.getElementById('errorBox')
  b.textContent='❌ '+msg; b.className='error-box show'
}
</script>
</body>
</html>
