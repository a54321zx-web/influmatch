<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인플루언서 탐색 — InfluMatch</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --navy:#1B3A2D;
    --red:#2D6A4F;
    --gold:#B7935A;
    --green:#2D6A4F;
    --yellow:#B7935A;
    --danger:#C0392B;
    --bg:#F7FAF8;
    --card:#FFFFFF;
    --border:#D8EDE3;
    --text:#111111;
    --muted:#777777;
    --navy2:#1B3A2D;
  }
  body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text)}
  nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;height:60px;gap:24px}
  .logo{font-size:18px;font-weight:700;color:var(--navy);text-decoration:none}
  .logo span{color:var(--red)}
  nav a{color:var(--muted);text-decoration:none;font-size:14px}
  nav a:hover{color:var(--text)}
  .btn-nav{margin-left:auto;background:var(--red);color:#fff!important;padding:8px 20px;border-radius:8px;font-weight:600}

  .page{max-width:1200px;margin:0 auto;padding:32px}
  .page-header{margin-bottom:28px}
  .page-header h1{font-size:28px;font-weight:800;color:var(--navy);margin-bottom:6px}
  .page-header p{font-size:14px;color:var(--muted)}

  /* 필터 */
  .filters{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;align-items:flex-end}
  .filter-group{display:flex;flex-direction:column;gap:5px}
  .filter-group label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase}
  .filter-group select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;outline:none;cursor:pointer}
  .filter-group select:focus{border-color:var(--red)}
  .btn-filter{background:var(--red);color:#fff;border:none;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
  .btn-filter:hover{background:#c73650}
  .result-count{margin-left:auto;font-size:13px;color:var(--muted);align-self:center}

  /* 카드 그리드 */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
  .inf-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;transition:border-color 0.2s,transform 0.2s;cursor:pointer}
  .inf-card:hover{border-color:var(--red);transform:translateY(-3px)}
  .card-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--navy));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
  .card-info h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:2px}
  .card-info .handle{font-size:12px;color:var(--muted)}
  .grade-badge{margin-left:auto;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}

  .card-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .stat{background:var(--bg);border-radius:8px;padding:8px 10px}
  .stat .sval{font-size:16px;font-weight:700;color:#fff}
  .stat .slabel{font-size:10px;color:var(--muted);margin-top:1px}

  .card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
  .cat-tag{background:rgba(233,69,96,0.15);color:var(--red);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
  .price{font-size:13px;font-weight:700;color:#111111}

  .empty{text-align:center;padding:80px 20px;color:var(--muted)}
  .empty h3{font-size:20px;margin-bottom:8px;color:var(--text)}

  .loading-grid{display:flex;justify-content:center;padding:60px}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">InfluMatch<span>.</span></a>
  <a href="/">홈</a>
  <a href="/marketplace">탐색</a>
  <a href="/dashboard" style="color:var(--muted);text-decoration:none;font-size:14px">로그인</a>
  <a href="/join" class="btn-nav">인플루언서 등록</a>
</nav>

<div class="page">
  <div class="page-header">
    <h1>인플루언서 탐색</h1>
    <p>AI 검증을 완료한 인플루언서 목록입니다</p>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>카테고리</label>
      <select id="fCategory">
        <option value="">전체</option>
        <option value="뷰티">뷰티</option><option value="패션">패션</option>
        <option value="음식">음식</option><option value="여행">여행</option>
        <option value="육아">육아</option><option value="운동">운동</option>
        <option value="게임">게임</option><option value="IT/테크">IT/테크</option>
        <option value="반려동물">반려동물</option><option value="인테리어">인테리어</option>
      </select>
    </div>
    <div class="filter-group">
      <label>티어</label>
      <select id="fTier">
        <option value="">전체</option>
        <option value="nano">Nano (500~1만)</option>
        <option value="micro">Micro (1만~10만)</option>
        <option value="mid">Mid (10만~50만)</option>
        <option value="macro">Macro (50만~100만)</option>
        <option value="mega">Mega (100만+)</option>
      </select>
    </div>
    <div class="filter-group">
      <label>최소 등급</label>
      <select id="fGrade">
        <option value="">전체</option>
        <option value="S">S등급 이상</option>
        <option value="A">A등급 이상</option>
        <option value="B">B등급 이상</option>
        <option value="C">C등급 이상</option>
      </select>
    </div>
    <button class="btn-filter" onclick="loadMarket()">검색</button>
    <div class="result-count" id="resultCount"></div>
  </div>

  <div id="gridArea">
    <div class="loading-grid"><div class="spinner"></div></div>
  </div>
</div>

<script>
const GRADE_CLR={S:'#5B4EC8',A:'#2D6A4F',B:'#B7935A',C:'#E67E22',D:'#C0392B'}

async function loadMarket() {
  document.getElementById('gridArea').innerHTML='<div class="loading-grid"><div class="spinner"></div></div>'
  const cat   = document.getElementById('fCategory').value
  const tier  = document.getElementById('fTier').value
  const grade = document.getElementById('fGrade').value

  let url = '/api/marketplace?limit=50'
  if(cat)   url += '&category='+encodeURIComponent(cat)
  if(tier)  url += '&tier='+encodeURIComponent(tier)
  if(grade) url += '&grade_min='+encodeURIComponent(grade)

  try {
    const data = await fetch(url).then(r=>r.json())
    const list = data.influencers || []
    document.getElementById('resultCount').textContent = `${list.length}명 검색됨`

    if(list.length===0) {
      document.getElementById('gridArea').innerHTML=`
        <div class="empty">
          <h3>등록된 인플루언서가 없습니다</h3>
          <p>조건을 바꾸거나 <a href="/join" style="color:var(--red)">인플루언서 등록</a>을 해보세요</p>
        </div>`
      return
    }

    document.getElementById('gridArea').innerHTML=`<div class="grid">${list.map(inf=>cardHTML(inf)).join('')}</div>`
  } catch(e) {
    document.getElementById('gridArea').innerHTML=`<div class="empty"><h3>로드 실패</h3><p>${e.message}</p></div>`
  }
}

function cardHTML(inf) {
  const grade  = inf.grade || 'D'
  const initials = (inf.name||'?').charAt(0).toUpperCase()
  const tier   = (inf.tier||'').toUpperCase()
  const score  = inf.final_score || 0
  const followers = (inf.follower_count||0).toLocaleString()
  const er     = (inf.raw_er||0).toFixed(1)
  const feed   = inf.feed_fmt || '—'
  const cat    = inf.category || '일반'

  return `
    <div class="inf-card" onclick="location.href='/profile?handle=${inf.insta_handle}'">
      <div class="card-top">
        <div class="avatar">${initials}</div>
        <div class="card-info">
          <h3>${inf.name}</h3>
          <div class="handle">@${inf.insta_handle}</div>
        </div>
        <div class="grade-badge" style="background:${GRADE_CLR[grade]||'#555'}">${grade}</div>
      </div>
      <div class="card-stats">
        <div class="stat"><div class="sval">${score}점</div><div class="slabel">신뢰도 점수</div></div>
        <div class="stat"><div class="sval">${tier}</div><div class="slabel">팔로워 티어</div></div>
        <div class="stat"><div class="sval">${followers}</div><div class="slabel">팔로워</div></div>
        <div class="stat"><div class="sval">${er}%</div><div class="slabel">참여율(ER)</div></div>
      </div>
      <div class="card-footer">
        <span class="cat-tag">${cat}</span>
        <span class="price">피드 ${feed}</span>
      </div>
    </div>`
}

loadMarket()
</script>
</body>
</html>
