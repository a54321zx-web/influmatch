<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어드민 분석 도구 — InfluMatch</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--navy:#1B3A2D;--green:#2D6A4F;--gold:#B7935A;--danger:#C0392B;--bg:#F7FAF8;--card:#FFFFFF;--border:#D8EDE3;--text:#111111;--muted:#777777}
  body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  
  .header{background:var(--navy);padding:16px 32px;display:flex;align-items:center;gap:16px}
  .header h1{font-size:16px;font-weight:700;color:#fff}
  .header span{font-size:12px;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:20px}

  .page{max-width:900px;margin:0 auto;padding:28px 24px}

  /* 입력 폼 */
  .search-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:24px}
  .search-card h2{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px}
  .search-row{display:flex;gap:10px}
  .search-row input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:9px;font-size:15px;outline:none;transition:border-color 0.2s}
  .search-row input:focus{border-color:var(--green)}
  .btn-analyze{background:var(--green);color:#fff;border:none;padding:12px 28px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
  .btn-analyze:hover{background:var(--navy)}
  .btn-analyze:disabled{background:#ccc;cursor:not-allowed}
  .hint{font-size:12px;color:var(--muted);margin-top:10px}

  /* 진행 상태 */
  .progress{display:none;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:24px;text-align:center}
  .progress.show{display:block}
  .spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .progress-text{font-size:14px;color:var(--muted)}
  .progress-handle{font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px}

  /* 결과 */
  .result{display:none}.result.show{display:block}

  .result-header{background:linear-gradient(135deg,#1B3A2D,#2D6A4F);border-radius:14px;padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:20px}
  .r-avatar{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0}
  .r-info h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
  .r-info p{font-size:13px;color:rgba(255,255,255,0.7)}
  .r-grade{margin-left:auto;width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;border:3px solid rgba(255,255,255,0.3)}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
  .kpi .val{font-size:22px;font-weight:700;color:var(--text);margin-bottom:3px}
  .kpi .lbl{font-size:11px;color:var(--muted)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
  .card h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
  .bar-row{margin-bottom:11px}
  .bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .bar-label b{color:var(--text)}.bar-label span{color:var(--muted)}
  .bar-track{height:7px;background:#E8F3ED;border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px}
  .price-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px}
  .price-row:last-child{border-bottom:none}
  .price-row .pv{font-weight:700;color:var(--text)}

  /* 에러 */
  .error-box{display:none;background:#FEF0F0;border:1px solid #F5C6C6;border-radius:10px;padding:16px;color:var(--danger);font-size:13px;margin-bottom:20px}
  .error-box.show{display:block}

  /* 최근 분석 히스토리 */
  .history{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
  .history h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px}
  .history-list{display:flex;flex-direction:column;gap:8px}
  .history-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg);border-radius:8px;cursor:pointer;transition:background 0.2s}
  .history-item:hover{background:#E8F3ED}
  .hi-grade{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
  .hi-info{flex:1}
  .hi-handle{font-size:13px;font-weight:600;color:var(--text)}
  .hi-score{font-size:11px;color:var(--muted)}
  .hi-time{font-size:11px;color:var(--muted);margin-left:auto}
</style>
</head>
<body>

<div class="header">
  <h1>🔍 InfluMatch 어드민 분석 도구</h1>
  <span>로컬 전용</span>
</div>

<div class="page">

  <!-- 검색 -->
  <div class="search-card">
    <h2>인스타그램 계정 즉시 분석</h2>
    <div class="search-row">
      <input type="text" id="handleInput" placeholder="계정명 입력 (@ 제외) — 예: jevousnous_"
        onkeydown="if(event.key==='Enter')startAnalyze()"/>
      <button class="btn-analyze" id="btnAnalyze" onclick="startAnalyze()">분석 시작</button>
    </div>
    <div class="hint">팔로워 300명 샘플링 분석 · 약 1~3분 소요 · DB 저장 안 됨 (조회 전용)</div>
  </div>

  <!-- 에러 -->
  <div class="error-box" id="errorBox"></div>

  <!-- 진행 중 -->
  <div class="progress" id="progress">
    <div class="spinner"></div>
    <div class="progress-handle" id="progressHandle">@계정명</div>
    <div class="progress-text" id="progressText">인스타그램 프로필 접속 중...</div>
  </div>

  <!-- 결과 -->
  <div class="result" id="result">
    <div class="result-header">
      <div class="r-avatar" id="rAvatar">?</div>
      <div class="r-info">
        <h2 id="rHandle">—</h2>
        <p id="rMeta">—</p>
      </div>
      <div class="r-grade" id="rGrade">—</div>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><div class="val" id="kScore">—</div><div class="lbl">신뢰도 점수</div></div>
      <div class="kpi"><div class="val" id="kFollower">—</div><div class="lbl">팔로워</div></div>
      <div class="kpi"><div class="val" id="kER">—</div><div class="lbl">참여율 (ER)</div></div>
      <div class="kpi"><div class="val" id="kRisk">—</div><div class="lbl">가짜팔로워</div></div>
    </div>

    <div class="grid2">
      <div class="card">
        <h3>📊 세부 점수</h3>
        <div id="scoreBreakdown"></div>
      </div>
      <div class="card">
        <h3>💰 광고 단가 추정</h3>
        <div id="priceRows"></div>
        <p style="font-size:11px;color:var(--muted);margin-top:10px">※ 시장 실거래가 기준</p>
      </div>
    </div>
  </div>

  <!-- 최근 분석 히스토리 -->
  <div class="history">
    <h3>🕐 최근 분석 기록</h3>
    <div class="history-list" id="historyList">
      <div style="font-size:13px;color:var(--muted)">아직 분석 기록이 없어요</div>
    </div>
  </div>

</div>

<script>
const GRADE_CLR = {S:'#5B4EC8',A:'#2D6A4F',B:'#B7935A',C:'#E67E22',D:'#C0392B'}
const TIER_LBL  = {nano:'나노',micro:'마이크로',mid:'미드',macro:'매크로',mega:'메가',unknown:'UNKNOWN'}
let history = []

async function startAnalyze() {
  const handle = document.getElementById('handleInput').value.trim().replace('@','')
  if(!handle){ showError('계정명을 입력해 주세요'); return }

  // UI 초기화
  document.getElementById('errorBox').className   = 'error-box'
  document.getElementById('result').className     = 'result'
  document.getElementById('progress').className   = 'progress show'
  document.getElementById('btnAnalyze').disabled  = true
  document.getElementById('progressHandle').textContent = '@' + handle
  document.getElementById('progressText').textContent   = '인스타그램 프로필 접속 중...'

  try {
    // 진행 메시지 업데이트
    const msgs = [
      '팔로워 샘플링 중... (300명)',
      '팔로워 품질 분석 중...',
      '댓글 진성도 분석 중...',
      'AI 스코어링 계산 중...',
      '광고 단가 산출 중...',
    ]
    let mi = 0
    const msgInterval = setInterval(() => {
      if(mi < msgs.length) {
        document.getElementById('progressText').textContent = msgs[mi++]
      }
    }, 15000)

    const res  = await fetch(`/analyze/${handle}?count=50`)
    const data = await res.json()
    clearInterval(msgInterval)

    if(data.error || data.status === 'error') {
      showError(data.error || data.message || '분석 실패')
      return
    }

    renderResult(handle, data)

    // 히스토리 저장
    history.unshift({handle, data, time: new Date().toLocaleTimeString('ko-KR')})
    if(history.length > 10) history.pop()
    renderHistory()

  } catch(e) {
    showError('서버 오류: ' + e.message)
  } finally {
    document.getElementById('progress').className  = 'progress'
    document.getElementById('btnAnalyze').disabled = false
  }
}

function renderResult(handle, d) {
  const grade = d.grade || 'D'
  const tier  = d.tier  || 'unknown'
  const stats = d.account_stats || {}

  document.getElementById('rAvatar').textContent = ('@'+handle)[0].toUpperCase()
  document.getElementById('rHandle').textContent = '@' + handle
  document.getElementById('rMeta').textContent   = `${TIER_LBL[tier]} 티어 · ${d.category?.primary || '일반'} · 팔로워 ${(stats.follower_count||0).toLocaleString()}명`

  const gEl = document.getElementById('rGrade')
  gEl.textContent       = grade
  gEl.style.background  = GRADE_CLR[grade] || '#999'

  document.getElementById('kScore').textContent    = (d.final_score||0).toFixed(1) + '점'
  document.getElementById('kScore').style.color    = GRADE_CLR[grade]
  document.getElementById('kFollower').textContent = (stats.follower_count||0).toLocaleString() + '명'
  document.getElementById('kER').textContent       = (d.raw_er||0).toFixed(1) + '%'

  const risk = d.fake_follower_risk || '—'
  const riskMap = {LOW:'🟢 낮음', MEDIUM:'🟡 보통', HIGH:'🔴 높음'}
  document.getElementById('kRisk').innerHTML = riskMap[risk] || risk

  // 세부 점수
  const sc = d.score_breakdown || {}
  const bars = [
    {label:'참여도 (ER)',   val: sc.er_score        || 0},
    {label:'팔로워 품질',   val: sc.quality_score   || 0},
    {label:'댓글 품질',     val: sc.comment_score   || 0},
    {label:'업로드 일관성', val: sc.consistency_score|| 0},
  ]
  document.getElementById('scoreBreakdown').innerHTML = bars.map(b=>{
    const pct = Math.round(b.val)
    const clr = pct>=70?'#2D6A4F':pct>=40?'#B7935A':'#C0392B'
    return `<div class="bar-row">
      <div class="bar-label"><b>${b.label}</b><span style="color:${clr}">${pct}점</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${clr}"></div></div>
    </div>`
  }).join('')

  // 광고 단가
  const adp = d.ad_price || {}
  document.getElementById('priceRows').innerHTML = `
    <div class="price-row"><span>📸 피드</span><span class="pv">${adp.feed_fmt||'—'}</span></div>
    <div class="price-row"><span>📖 스토리</span><span class="pv">${adp.story_fmt||'—'}</span></div>
    <div class="price-row"><span>🎬 릴스</span><span class="pv">${adp.reels_fmt||'—'}</span></div>
  `

  document.getElementById('result').className = 'result show'
  document.getElementById('result').scrollIntoView({behavior:'smooth'})
}

function renderHistory() {
  const list = document.getElementById('historyList')
  if(!history.length) return
  list.innerHTML = history.map(h => {
    const grade = h.data.grade || 'D'
    const score = (h.data.final_score||0).toFixed(1)
    return `<div class="history-item" onclick="reloadResult('${h.handle}')">
      <div class="hi-grade" style="background:${GRADE_CLR[grade]}">${grade}</div>
      <div class="hi-info">
        <div class="hi-handle">@${h.handle}</div>
        <div class="hi-score">${score}점 · ${h.data.tier||''} · ${h.data.category?.primary||'일반'}</div>
      </div>
      <div class="hi-time">${h.time}</div>
    </div>`
  }).join('')
}

function reloadResult(handle) {
  const h = history.find(x=>x.handle===handle)
  if(h) { renderResult(handle, h.data); document.getElementById('handleInput').value = handle }
}

function showError(msg) {
  const el = document.getElementById('errorBox')
  el.textContent = '❌ ' + msg
  el.className   = 'error-box show'
}
</script>
</body>
</html>
